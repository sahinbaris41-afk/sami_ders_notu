  <text x="92" y="560" font-size="15" fill="#475569" font-family="Segoe UI, Arial">1. Global Trade Strategies and Digital Export Models</text>
  <text x="92" y="590" font-size="15" fill="#475569" font-family="Segoe UI, Arial">2. Sustainable Logistics and Supply Chain Analysis</text>
  <text x="92" y="620" font-size="15" fill="#475569" font-family="Segoe UI, Arial">3. Customs, E-Trade and Risk Management Proceedings</text>

  <rect x="492" y="280" width="430" height="584" rx="24" fill="#ffffff" stroke="#dbe4f0"/>
