  <rect x="524" y="352" width="366" height="96" rx="18" fill="#eff6ff"/>
  <text x="548" y="387" font-size="18" fill="#1d4ed8" font-family="Segoe UI, Arial">Vize Haftasi Stratejisi</text>
  <text x="548" y="415" font-size="14" fill="#1e40af" font-family="Segoe UI, Arial">Odak: temel kavramlar, tekrar, konu haritasi</text>
  <rect x="524" y="470" width="366" height="120" rx="18" fill="#ecfdf5"/>
  <text x="548" y="504" font-size="20" fill="#047857" font-family="Segoe UI, Arial">Otomatik Okuma Listesi</text>
  <text x="548" y="534" font-size="14" fill="#047857" font-family="Segoe UI, Arial">1. Yayin | 2. Yayin | 3. Yayin | 4. Yayin</text>
  <text x="548" y="562" font-size="14" fill="#047857" font-family="Segoe UI, Arial">Oncelik, asama ve konu eslesmeleri ile siralama</text>
  <rect x="524" y="612" width="366" height="208" rx="18" fill="#fff7ed"/>
  <text x="548" y="646" font-size="20" fill="#c2410c" font-family="Segoe UI, Arial">Gunluk Plan + Mini Mod</text>
  <text x="548" y="676" font-size="14" fill="#9a3412" font-family="Segoe UI, Arial">Gun 1: 10 dk isinma, 30 dk ana okuma, 20 dk tekrar</text>
  <text x="548" y="706" font-size="14" fill="#9a3412" font-family="Segoe UI, Arial">60 dk mini mod: Isinma, ana okuma, not cikar</text>
  <text x="548" y="736" font-size="14" fill="#9a3412" font-family="Segoe UI, Arial">Sonraki gun uyarlamasi ilerlemeye gore degisir</text>

  <rect x="948" y="280" width="456" height="584" rx="24" fill="#ffffff" stroke="#dbe4f0"/>
  <text x="980" y="324" font-size="26" fill="#0f172a" font-family="Segoe UI, Arial">Kisisel Ilerleme ve Raporlama</text>
  <rect x="980" y="352" width="392" height="130" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="1006" y="388" font-size="20" fill="#111827" font-family="Segoe UI, Arial">Tamamlandi Isaretleme</text>
  <text x="1006" y="418" font-size="14" fill="#475569" font-family="Segoe UI, Arial">[x] Okuma listesi</text>
  <text x="1006" y="444" font-size="14" fill="#475569" font-family="Segoe UI, Arial">[x] Gun 1 plani</text>
  <text x="1006" y="470" font-size="14" fill="#475569" font-family="Segoe UI, Arial">[ ] Mini mod blok 2</text>
  <rect x="980" y="506" width="392" height="140" rx="18" fill="#eff6ff"/>
  <text x="1006" y="542" font-size="20" fill="#1d4ed8" font-family="Segoe UI, Arial">Otomatik Telafi Plani</text>
  <text x="1006" y="572" font-size="14" fill="#1e40af" font-family="Segoe UI, Arial">Tamamlanmayan yayinlar ve kacirilan gunler toplaniyor</text>
  <text x="1006" y="598" font-size="14" fill="#1e40af" font-family="Segoe UI, Arial">Sonraki gun icin daraltma veya genisletme onerisi cikariliyor</text>
  <rect x="980" y="670" width="392" height="150" rx="18" fill="#ecfdf5"/>
  <text x="1006" y="706" font-size="20" fill="#047857" font-family="Segoe UI, Arial">Haftalik Basari Raporu</text>
  <text x="1006" y="736" font-size="14" fill="#047857" font-family="Segoe UI, Arial">Son 7 gundeki tamamlanan gorevler</text>
  <text x="1006" y="762" font-size="14" fill="#047857" font-family="Segoe UI, Arial">Tur bazli dagilim ve genel ilerleme yuzdesi</text>
</svg>
