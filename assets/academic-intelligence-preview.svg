  <text x="92" y="414" font-size="14" fill="#475569" font-family="Segoe UI, Arial">Uluslararasi Ticaret | BTU Sayfam | Makaleler, Bildiriler</text>
  <text x="92" y="442" font-size="14" fill="#475569" font-family="Segoe UI, Arial">Yayin, Atif, H-index verileri ve kategori sayilari</text>
  <rect x="68" y="490" width="366" height="330" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
